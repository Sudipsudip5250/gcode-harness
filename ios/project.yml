name: GcodeMobile
options:
  bundleIdPrefix: com.gcode
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  GcodeKit:
    path: .

targets:
  GcodeMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources/GcodeMobile
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Sources/GcodeMobile/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gcode.mobile
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TAS6ARKDN7
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GcodeKit
        product: GcodeKit
    entitlements:
      path: Sources/GcodeMobile/GcodeMobile.entitlements
      properties: {}
